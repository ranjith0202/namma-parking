server:
  port: 8084
  
spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:http://config-server:8888"
    
resilience4j:
  circuitbreaker:
    instances:
      productService:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
