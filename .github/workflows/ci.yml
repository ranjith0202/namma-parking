name: CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Spring Boot Services
        run: mvn clean install -DskipTests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular UI
        run: |
          cd namma-parking-ui
          npm install
          npm run build

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Build & Push Config Server
        run: |
          docker build -t ghcr.io/${{ github.repository }}/config-server:latest ./config-server
          docker push ghcr.io/${{ github.repository }}/config-server:latest
  
      - name: Build & Push Auth Service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/auth-service:latest ./auth-service
          docker push ghcr.io/${{ github.repository }}/auth-service:latest

      - name: Build & Push Parking Service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/parking-service:latest ./parking-service
          docker push ghcr.io/${{ github.repository }}/parking-service:latest

      - name: Build & Push User Service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/user-service:latest ./user-service
          docker push ghcr.io/${{ github.repository }}/user-service:latest

      - name: Build & Push API Gateway
        run: |
          docker build -t ghcr.io/${{ github.repository }}/api-gateway:latest ./api-gateway
          docker push ghcr.io/${{ github.repository }}/api-gateway:latest

      - name: Build & Push Eureka Server
        run: |
          docker build -t ghcr.io/${{ github.repository }}/eureka-server:latest ./eureka-server
          docker push ghcr.io/${{ github.repository }}/eureka-server:latest

      - name: Build & Push Angular UI
        run: |
          docker build -t ghcr.io/${{ github.repository }}/angular-ui:latest ./namma-parking-ui
          docker push ghcr.io/${{ github.repository }}/angular-ui:latest

  