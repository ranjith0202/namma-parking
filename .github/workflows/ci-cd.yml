name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build all modules
        run: mvn clean install -DskipTests

      - name: Upload JARs
        uses: actions/upload-artifact@v3
        with:
          name: service-jars
          path: |
            auth-service/target/*.jar
            user-service/target/*.jar
            parking-service/target/*.jar
            api-gateway/target/*.jar
            eureka-server/target/*.jar

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download JARs
        uses: actions/download-artifact@v3
        with:
          name: service-jars
          path: .

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push Auth Service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/auth-service:latest ./auth-service
          docker push ghcr.io/${{ github.repository }}/auth-service:latest

      - name: Build & Push Parking Service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/parking-service:latest ./parking-service
          docker push ghcr.io/${{ github.repository }}/parking-service:latest

      - name: Build & Push User Service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/user-service:latest ./user-service
          docker push ghcr.io/${{ github.repository }}/user-service:latest

      - name: Build & Push API Gateway
        run: |
          docker build -t ghcr.io/${{ github.repository }}/api-gateway:latest ./api-gateway
          docker push ghcr.io/${{ github.repository }}/api-gateway:latest

      - name: Build & Push Eureka Server
        run: |
          docker build -t ghcr.io/${{ github.repository }}/eureka-server:latest ./eureka-server
          docker push ghcr.io/${{ github.repository }}/eureka-server:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        run: docker-compose -f docker-compose.yml up -d --build
