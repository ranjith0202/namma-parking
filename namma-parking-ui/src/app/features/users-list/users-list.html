<div class="container">

  <h2>User List</h2>

  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>User Name</th>
        <th>Email</th>
        <th>Created By</th>
        <th>Created Time</th>
      </tr>
    </thead>

    <tbody>
      @for(user of users; track user.id) {
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.userName }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.createdBy }}</td>
        <td>{{ user.createdTime | date:'dd-MM-yyyy HH:mm' }}</td>
      </tr>
      }
    </tbody>
  </table>

</div>
