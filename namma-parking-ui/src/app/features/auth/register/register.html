<div class="register-container">

  <h2>User Registration</h2>
@if(successMessage){
    <p class="success-message">
      {{ successMessage }}
    </p>
  }

  @if(errorMessage){
    <p class="error-message">
      {{ errorMessage }}
    </p>
  }
  <form (ngSubmit)="register()" #registerForm="ngForm">

    <div class="form-group">
      <label for="userName">User Name</label>
      <input
        id="userName"
        type="text"
        name="userName"
        [(ngModel)]="user.userName"
        required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="user.password"
        required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="user.email">
    </div>
<div class="form-group">
  <label>Roles</label>

  <div *ngFor="let role of roleOptions">
    <input
      type="checkbox"
      [id]="'role-' + role.id"
      [checked]="user.rolesIds.includes(role.id)"
      (change)="onRoleChange($event, role.id)">

    <label [for]="'role-' + role.id">
      {{ role.name }}
    </label>
  </div>
</div>
    <button type="submit">
      Register User
    </button>

  </form>

  

</div>
