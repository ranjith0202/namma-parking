<h2>Login</h2>

<form (ngSubmit)="login()">

<div class="login-container">

  <div class="form-group">
      <label for="userName">Username</label>
      <input
        id="userName"
        type="text"
        name="userName"
        [(ngModel)]="userName"
        required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        required>
    </div>
  

  <br>

  <button type="submit">
    Login
  </button>
</div>
</form>
